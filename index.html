<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Mi Restaurante</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { text-align: center; color: #d35400; }
        .seccion { margin-bottom: 20px; }
        .plato { display: flex; justify-content: space-between; border-bottom: 1px dotted #ccc; padding: 10px 0; }
        .precio { font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍴 Mi Restaurante</h1>
        <div class="seccion">
            <h2>Entradas</h2>
            <div class="plato"><span>Nachos con Queso</span> <span class="precio">$8.00</span></div>
            <div class="plato"><span>Ensalada César</span> <span class="precio">$10.00</span></div>
        </div>
        <div class="seccion">
            <h2>Platos Fuertes</h2>
            <div class="plato"><span>Hamburguesa Gourmet</span> <span class="precio">$15.00</span></div>
            <div class="plato"><span>Pasta Carbonara</span> <span class="precio">$13.00</span></div>
        </div>
    </div>
</body>
</html>
